name: encrypt_env
description: >
  Generate obfuscated or encrypted Dart files from YAML configuration.
  Protect sensitive data in Flutter/Dart applications with multi-layer XOR obfuscation
  or AES-256 encryption.
version: 3.0.0
homepage: https://github.com/edunatalec/encrypt-env
repository: https://github.com/edunatalec/encrypt-env
issue_tracker: https://github.com/edunatalec/encrypt-env/issues

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  args: ^2.7.0
  cli_completion: ^0.5.1
  fortis: ^0.1.0
  mason_logger: ^0.3.3
  yaml: ^3.1.3
  pub_updater: ^0.5.0

dev_dependencies:
  test: ^1.26.3
  build_runner: ^2.7.1
  build_version: ^2.1.2
  lints: ^5.1.1

executables:
  encrypt_env:

topics:
  - encryption
  - obfuscation
  - environment
  - security
  - dotenv
